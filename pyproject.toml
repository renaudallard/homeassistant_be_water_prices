[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
# Default per-test timeout (pytest-timeout is already a dev dep). A
# resolver/parser regression that drops a loop's ``pos += 1`` step
# would otherwise hang CI silently instead of failing the offending
# test; 30s is generous enough not to flake on slow CI runners.
timeout = 30

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
# RUF001 flags ambiguous Unicode whitespace; we intentionally handle NBSP /
# THIN SPACE / LINE SEPARATOR variants because Belgian publications use them
# in numeric literals (see _pdf._NUMERIC_SEPARATORS, test_pdf).
ignore = ["E501", "RUF001", "RUF002", "RUF003"]

[[tool.mypy.overrides]]
module = [
    "pypdf",
    "pypdf.*",
    "pdfplumber",
    "pdfplumber.*",
    "bs4",
    "bs4.*",
    "homeassistant",
    "homeassistant.*",
    "voluptuous",
]
ignore_missing_imports = true

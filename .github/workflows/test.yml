name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pypdf pdfplumber beautifulsoup4 homeassistant pytest-homeassistant-custom-component
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type check
        run: mypy --strict custom_components/be_water_prices
      - name: Tests
        run: pytest tests/ -q
